name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - alpha
      - beta
      - master
      - renovate/**

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@8f01012bc996c714b983f2b4c90c8f546c69f342 # 5.2.2
    permissions:
      pull-requests: read
  build:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Validate `README.md`
    permissions:
      contents: read
    uses: dargmuesli/github-actions/.github/workflows/dargstack-rgen.yml@8f01012bc996c714b983f2b4c90c8f546c69f342 # 5.2.2
  release-semantic:
    needs: build
    name: Semantic Release
    uses: dargmuesli/github-actions/.github/workflows/release-semantic.yml@8f01012bc996c714b983f2b4c90c8f546c69f342 # 5.2.2
    permissions:
      contents: write
      id-token: write
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
